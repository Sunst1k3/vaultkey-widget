<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>VaultKeyVPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }
        .server-status {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 8px #4CAF50;
        }
        .server-name {
            font-weight: 600;
            font-size: 18px;
        }
        .server-load {
            font-size: 13px;
            color: #aaa;
            margin-left: auto;
        }
        .key-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .key-status.active {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
        }
        .key-status.expired {
            background: rgba(244,67,54,0.2);
            color: #f44336;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-label {
            color: #888;
        }
        .info-value {
            font-weight: 500;
        }
        .traffic-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin: 12px 0;
            overflow: hidden;
        }
        .traffic-fill {
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            width: 0%;
            height: 100%;
            border-radius: 10px;
        }
        .vpn-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .btn-on {
            background: #4CAF50;
            color: white;
        }
        .btn-off {
            background: rgba(244,67,54,0.8);
            color: white;
        }
        .utility-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .util-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
        }
        .util-btn.active {
            background: #0066CC;
            border-color: #0066CC;
        }
        .email-form {
            text-align: center;
            padding: 40px 20px;
        }
        .email-input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .email-input::placeholder {
            color: #888;
        }
        .submit-btn {
            background: #0066CC;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .hidden {
            display: none;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading">Загрузка...</div>

        <div id="emailForm" class="card email-form">
            <h2>🔐 VaultKeyVPN</h2>
            <p>Введите ваш логин</p>
            <input type="text" id="loginInput" class="email-input" placeholder="SotnikovIPHONE">
            <button id="saveBtn" class="submit-btn">Продолжить</button>
        </div>

        <div id="widget" class="hidden">
            <div class="card">
                <div class="card-title">📍 СТАТУС СЕРВЕРА</div>
                <div class="server-status">
                    <div class="status-led"></div>
                    <span class="server-name">🇳🇱 Нидерланды</span>
                    <span class="server-load">Нагрузка: 32%</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🔑 ИНФОРМАЦИЯ О КЛЮЧЕ</div>
                <div id="keyStatus" class="key-status">—</div>
                <div class="info-row">
                    <span class="info-label">Логин</span>
                    <span id="keyLogin" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Действителен до</span>
                    <span id="keyExpiry" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Использовано трафика</span>
                    <span id="keyUsed" class="info-value">—</span>
                </div>
                <div class="traffic-bar">
                    <div id="trafficFill" class="traffic-fill"></div>
                </div>
                <div class="info-row">
                    <span class="info-label">Осталось</span>
                    <span id="keyRemaining" class="info-value">—</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🎮 УПРАВЛЕНИЕ VPN</div>
                <div class="vpn-buttons">
                    <button id="vpnOnBtn" class="btn btn-on">ВКЛЮЧИТЬ</button>
                    <button id="vpnOffBtn" class="btn btn-off">ВЫКЛЮЧИТЬ</button>
                </div>
                <div class="card-title">📱 ВЫБОР УТИЛИТЫ</div>
                <div class="utility-selector">
                    <div data-util="shadowrocket" class="util-btn">Shadowrocket</div>
                    <div data-util="blacktemple" class="util-btn">BLACKTEMPLE</div>
                    <div data-util="happ" class="util-btn">Happ</div>
                </div>
                <p id="utilHelp" style="font-size: 11px; color: #555; margin-top: 12px;"></p>
            </div>

            <button id="resetBtn" style="background: none; border: none; color: #555; font-size: 12px; margin-top: 8px;">🔄 Сменить логин</button>
        </div>
        <div class="footer">VaultKeyVPN</div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const API_BASE = 'http://144.31.227.188:8888/vaultkey-api.php';

        // ========== УТИЛИТЫ ==========
        const UTILS = {
            shadowrocket: {
                name: 'Shadowrocket',
                urlOn: 'shadowrocket://toggle?enabled=true',
                urlOff: 'shadowrocket://toggle?enabled=false',
                downloadUrl: 'https://apps.apple.com/app/shadowrocket/id932747118'
            },
            blacktemple: {
                name: 'BLACKTEMPLE',
                urlOn: 'blacktemple://connect',
                urlOff: 'blacktemple://disconnect',
                downloadUrl: 'https://apps.apple.com/app/blacktemple/id6443720793'
            },
            happ: {
                name: 'Happ',
                urlOn: 'happ://connect',
                urlOff: 'happ://disconnect',
                downloadUrl: 'https://apps.apple.com/app/happ/id6447359973'
            }
        };

        let currentUtil = 'shadowrocket';

        // ========== ЗАПРОС К API ==========
        async function checkKey(login) {
            const url = API_BASE + '?login=' + encodeURIComponent(login);
            const response = await fetch(url);
            const data = await response.json();
            return data;
        }

        // ========== ОТОБРАЖЕНИЕ ==========
        function displayData(data) {
            const statusEl = document.getElementById('keyStatus');
            const loginEl = document.getElementById('keyLogin');
            const expiryEl = document.getElementById('keyExpiry');
            const usedEl = document.getElementById('keyUsed');
            const remainingEl = document.getElementById('keyRemaining');
            const trafficFill = document.getElementById('trafficFill');

            if (data.success === false) {
                statusEl.textContent = '❌ КЛЮЧ НЕ НАЙДЕН';
                statusEl.className = 'key-status expired';
                loginEl.textContent = data.login || '?';
                return;
            }

            // Логин
            loginEl.textContent = data.login;

            // Срок действия
            expiryEl.textContent = data.expiry_date;

            // Трафик в ГБ
            const usedGB = (data.used_traffic / (1024 * 1024 * 1024)).toFixed(1);
            
            if (data.total_traffic > 0) {
                const totalGB = (data.total_traffic / (1024 * 1024 * 1024)).toFixed(1);
                const remainingGB = (data.remaining_traffic / (1024 * 1024 * 1024)).toFixed(1);
                usedEl.textContent = `${usedGB} GB / ${totalGB} GB`;
                remainingEl.textContent = `${remainingGB} GB`;
                const percent = (data.used_traffic / data.total_traffic) * 100;
                trafficFill.style.width = Math.min(percent, 100) + '%';
            } else {
                usedEl.textContent = `${usedGB} GB (Безлимит)`;
                remainingEl.textContent = '∞';
                trafficFill.style.width = '0%';
            }

            // Статус
            if (data.status === 'active') {
                statusEl.textContent = '✅ АКТИВЕН';
                statusEl.className = 'key-status active';
            } else if (data.status === 'expired') {
                statusEl.textContent = '⛔ ИСТЕК';
                statusEl.className = 'key-status expired';
            } else {
                statusEl.textContent = '⚠️ ОГРАНИЧЕН';
                statusEl.className = 'key-status limited';
            }
        }

        // ========== ЗАПУСК ==========
        async function start(login) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('emailForm').classList.add('hidden');
            
            const data = await checkKey(login);
            displayData(data);
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('widget').classList.remove('hidden');
        }

        // ========== СОХРАНЕНИЕ ЛОГИНА ==========
        function saveLogin(login) {
            localStorage.setItem('vaultkey_login', login);
        }

        function getSavedLogin() {
            return localStorage.getItem('vaultkey_login');
        }

        // ========== УПРАВЛЕНИЕ VPN ==========
        function executeVpn(action) {
            const util = UTILS[currentUtil];
            const url = action === 'on' ? util.urlOn : util.urlOff;
            window.location.href = url;
            setTimeout(() => {
                alert('Не удалось открыть ' + util.name + '. Проверьте, что приложение установлено.');
            }, 500);
        }

        // ========== СОХРАНЕНИЕ УТИЛИТЫ ==========
        function saveUtil(util) {
            localStorage.setItem('vaultkey_util', util);
            currentUtil = util;
            document.querySelectorAll('.util-btn').forEach(btn => {
                if (btn.dataset.util === util) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function getSavedUtil() {
            const saved = localStorage.getItem('vaultkey_util');
            if (saved && UTILS[saved]) return saved;
            return 'shadowrocket';
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function init() {
            // Обработчики формы
            document.getElementById('saveBtn').onclick = () => {
                const login = document.getElementById('loginInput').value.trim();
                if (login) {
                    saveLogin(login);
                    start(login);
                } else {
                    alert('Введите логин');
                }
            };

            // Смена логина
            document.getElementById('resetBtn').onclick = () => {
                localStorage.removeItem('vaultkey_login');
                location.reload();
            };

            // Кнопки VPN
            document.getElementById('vpnOnBtn').onclick = () => executeVpn('on');
            document.getElementById('vpnOffBtn').onclick = () => executeVpn('off');

            // Выбор утилиты
            document.querySelectorAll('.util-btn').forEach(btn => {
                btn.onclick = () => saveUtil(btn.dataset.util);
            });

            // Подсказка
            document.getElementById('utilHelp').innerHTML = '⚠️ Утилита должна быть установлена. <a href="' + UTILS[currentUtil].downloadUrl + '" target="_blank" style="color:#0066CC;">Скачать</a>';

            // Загрузка сохранённого логина
            const savedLogin = getSavedLogin();
            if (savedLogin) {
                start(savedLogin);
            }
        }

        // Загружаем сохранённую утилиту
        currentUtil = getSavedUtil();
        
        // Запускаем
        init();
    </script>
</body>
</html>
