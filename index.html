<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>VaultKeyVPN — Управление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 8px #4CAF50;
        }
        .status-led.offline {
            background: #f44336;
            box-shadow: 0 0 8px #f44336;
        }
        .server-name {
            font-weight: 600;
            font-size: 18px;
        }
        .server-load {
            font-size: 13px;
            color: #aaa;
            margin-left: auto;
        }

        .key-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .key-status.active {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
        }
        .key-status.expired {
            background: rgba(244,67,54,0.2);
            color: #f44336;
        }
        .key-status.limited {
            background: rgba(255,152,0,0.2);
            color: #FF9800;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-label {
            color: #888;
        }
        .info-value {
            font-weight: 500;
        }

        .traffic-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin: 12px 0;
            overflow: hidden;
        }
        .traffic-fill {
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .vpn-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-on {
            background: #4CAF50;
            color: white;
        }
        .btn-off {
            background: rgba(244,67,54,0.8);
            color: white;
        }

        .utility-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .util-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .util-btn.active {
            background: #0066CC;
            border-color: #0066CC;
        }

        .email-form {
            text-align: center;
            padding: 40px 20px;
        }
        .email-input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .email-input::placeholder {
            color: #888;
        }
        .submit-btn {
            background: #0066CC;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .hidden {
            display: none;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading" class="loading">Загрузка...</div>

        <div id="emailForm" class="card email-form">
            <h2>🔐 VaultKeyVPN</h2>
            <p>Введите ваш логин из панели 3x-ui</p>
            <input type="text" id="loginInput" class="email-input" placeholder="SotnikovIPHONE">
            <button id="saveBtn" class="submit-btn">Продолжить</button>
        </div>

        <div id="widget" class="hidden">
            <div class="card">
                <div class="card-title">📍 СТАТУС СЕРВЕРА</div>
                <div class="server-status">
                    <div id="serverLed" class="status-led"></div>
                    <span class="server-name">🇳🇱 Нидерланды</span>
                    <span id="serverLoad" class="server-load">—</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🔑 ИНФОРМАЦИЯ О КЛЮЧЕ</div>
                <div id="keyStatus" class="key-status">—</div>
                <div class="info-row">
                    <span class="info-label">Логин</span>
                    <span id="keyLogin" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Действителен до</span>
                    <span id="keyExpiry" class="info-value">—</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Использовано трафика</span>
                    <span id="keyUsed" class="info-value">—</span>
                </div>
                <div class="traffic-bar">
                    <div id="trafficFill" class="traffic-fill"></div>
                </div>
                <div class="info-row">
                    <span class="info-label">Осталось</span>
                    <span id="keyRemaining" class="info-value">—</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🎮 УПРАВЛЕНИЕ VPN</div>
                <div class="vpn-buttons">
                    <button id="vpnOnBtn" class="btn btn-on">ВКЛЮЧИТЬ</button>
                    <button id="vpnOffBtn" class="btn btn-off">ВЫКЛЮЧИТЬ</button>
                </div>
                <div class="card-title">📱 ВЫБОР УТИЛИТЫ</div>
                <div class="utility-selector">
                    <div data-util="shadowrocket" class="util-btn">Shadowrocket</div>
                    <div data-util="blacktemple" class="util-btn">BLACKTEMPLE</div>
                    <div data-util="happ" class="util-btn">Happ</div>
                </div>
                <p id="utilHelp" style="font-size: 11px; color: #555; margin-top: 12px;"></p>
            </div>

            <button id="resetBtn" style="background: none; border: none; color: #555; font-size: 12px; margin-top: 8px;">🔄 Сменить логин</button>
        </div>
        <div class="footer">VaultKeyVPN — ваш надёжный VPN</div>
    </div>

    <script>
        const API_BASE = 'https://vaultkeyvpn.duckdns.org:8080/vaultkey-api.php';

        const UTILS = {
            shadowrocket: {
                name: 'Shadowrocket',
                urlOn: 'shadowrocket://toggle?enabled=true',
                urlOff: 'shadowrocket://toggle?enabled=false',
                downloadUrl: 'https://apps.apple.com/app/shadowrocket/id932747118'
            },
            blacktemple: {
                name: 'BLACKTEMPLE',
                urlOn: 'blacktemple://connect',
                urlOff: 'blacktemple://disconnect',
                downloadUrl: 'https://apps.apple.com/app/blacktemple/id6443720793'
            },
            happ: {
                name: 'Happ',
                urlOn: 'happ://connect',
                urlOff: 'happ://disconnect',
                downloadUrl: 'https://apps.apple.com/app/happ/id6447359973'
            }
        };

        let currentLogin = null;
        let currentUtil = 'shadowrocket';

        // Загрузка данных
        async function fetchKeyInfo(login) {
            try {
                const response = await fetch(`${API_BASE}?login=${encodeURIComponent(login)}`);
                return await response.json();
            } catch (error) {
                return { success: false, error: 'Ошибка подключения' };
            }
        }

        // Отображение данных
        function displayKeyInfo(data) {
            if (!data.success) {
                document.getElementById('keyStatus').textContent = '❌ КЛЮЧ НЕ НАЙДЕН';
                document.getElementById('keyStatus').className = 'key-status expired';
                return;
            }

            document.getElementById('keyLogin').textContent = data.login;
            document.getElementById('keyExpiry').textContent = data.expiry_date;

            const usedGB = (data.used_traffic / (1024 * 1024 * 1024)).toFixed(1);
            
            if (data.total_traffic > 0) {
                const totalGB = (data.total_traffic / (1024 * 1024 * 1024)).toFixed(1);
                const remainingGB = (data.remaining_traffic / (1024 * 1024 * 1024)).toFixed(1);
                document.getElementById('keyUsed').textContent = `${usedGB} GB / ${totalGB} GB`;
                document.getElementById('keyRemaining').textContent = `${remainingGB} GB`;
                const percent = (data.used_traffic / data.total_traffic) * 100;
                document.getElementById('trafficFill').style.width = `${Math.min(percent, 100)}%`;
            } else {
                document.getElementById('keyUsed').textContent = `${usedGB} GB (Безлимит)`;
                document.getElementById('keyRemaining').textContent = '∞';
                document.getElementById('trafficFill').style.width = '0%';
            }

            if (data.status === 'active') {
                document.getElementById('keyStatus').textContent = '✅ АКТИВЕН';
                document.getElementById('keyStatus').className = 'key-status active';
            } else if (data.status === 'expired') {
                document.getElementById('keyStatus').textContent = '⛔ ИСТЕК';
                document.getElementById('keyStatus').className = 'key-status expired';
            } else {
                document.getElementById('keyStatus').textContent = '⚠️ ОГРАНИЧЕН';
                document.getElementById('keyStatus').className = 'key-status limited';
            }
        }

        // Статус сервера (демо)
        function updateServerStatus() {
            document.getElementById('serverLed').classList.remove('offline');
            document.getElementById('serverLoad').textContent = 'Нагрузка: 32%';
        }

        // Управление VPN
        function executeVpnCommand(action) {
            const util = UTILS[currentUtil];
            window.location.href = action === 'on' ? util.urlOn : util.urlOff;
            setTimeout(() => {
                alert(`Не удалось открыть ${util.name}. Убедитесь, что приложение установлено.`);
            }, 500);
        }

        // Инициализация
        async function initWidget(login) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('emailForm').classList.add('hidden');
            
            const data = await fetchKeyInfo(login);
            displayKeyInfo(data);
            updateServerStatus();
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('widget').classList.remove('hidden');
        }

        // Сохранение логина
        function saveLogin(login) {
            localStorage.setItem('vaultkey_login', login);
            currentLogin = login;
        }

        function getStoredLogin() {
            return localStorage.getItem('vaultkey_login');
        }

        function saveUtil(util) {
            localStorage.setItem('vaultkey_util', util);
            currentUtil = util;
            document.querySelectorAll('.util-btn').forEach(btn => {
                if (btn.dataset.util === util) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function getStoredUtil() {
            const stored = localStorage.getItem('vaultkey_util');
            return stored && UTILS[stored] ? stored : 'shadowrocket';
        }

        // Настройка обработчиков
        function setup() {
            document.getElementById('saveBtn').onclick = () => {
                const login = document.getElementById('loginInput').value.trim();
                if (login) {
                    saveLogin(login);
                    initWidget(login);
                } else {
                    alert('Введите логин');
                }
            };

            document.getElementById('resetBtn').onclick = () => {
                localStorage.removeItem('vaultkey_login');
                location.reload();
            };

            document.getElementById('vpnOnBtn').onclick = () => executeVpnCommand('on');
            document.getElementById('vpnOffBtn').onclick = () => executeVpnCommand('off');

            document.querySelectorAll('.util-btn').forEach(btn => {
                btn.onclick = () => saveUtil(btn.dataset.util);
            });

            const helpEl = document.getElementById('utilHelp');
            helpEl.innerHTML = `⚠️ Для работы с утилитой она должна быть установлена. <a href="${UTILS[currentUtil].downloadUrl}" target="_blank" style="color:#0066CC;">Скачать</a>`;
        }

        // Старт
        setup();
        currentUtil = getStoredUtil();
        document.querySelectorAll('.util-btn').forEach(btn => {
            if (btn.dataset.util === currentUtil) btn.classList.add('active');
        });

        const savedLogin = getStoredLogin();
        if (savedLogin) {
            document.getElementById('emailForm').classList.add('hidden');
            initWidget(savedLogin);
        }
    </script>
</body>
</html>
