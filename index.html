<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VaultKeyVPN</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: white;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        input, button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            margin-bottom: 12px;
        }
        input {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        button {
            background: #0066CC;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 14px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .hidden { display: none; }
        .loading { text-align: center; padding: 40px; color: #888; }
        .status-active { color: #4CAF50; }
        .status-expired { color: #f44336; }
    </style>
</head>
<body>
    <div id="loading" class="loading">Загрузка...</div>
    
    <div id="loginScreen">
        <div class="card">
            <h2>🔐 VaultKeyVPN</h2>
            <p>Введите ваш логин</p>
            <input type="text" id="loginInput" placeholder="SotnikovIPHONE">
            <button id="checkBtn">Проверить</button>
        </div>
    </div>
    
    <div id="resultScreen" class="hidden">
        <div class="card">
            <h3>🔑 ИНФОРМАЦИЯ О КЛЮЧЕ</h3>
            <div id="resultContent"></div>
            <button id="backBtn" style="margin-top: 20px;">Назад</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://144.31.227.188:8080/vaultkey-api.php';
        
        const loginDiv = document.getElementById('loginScreen');
        const resultDiv = document.getElementById('resultScreen');
        const loadingDiv = document.getElementById('loading');
        const resultContent = document.getElementById('resultContent');
        
        async function checkLogin(login) {
            loadingDiv.classList.remove('hidden');
            loginDiv.classList.add('hidden');
            resultDiv.classList.add('hidden');
            
            try {
                const url = API_URL + '?login=' + encodeURIComponent(login);
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success) {
                    const usedGB = (data.used_traffic / (1024 * 1024 * 1024)).toFixed(1);
                    resultContent.innerHTML = `
                        <p><strong>Логин:</strong> ${data.login}</p>
                        <p><strong>Статус:</strong> <span class="status-active">✅ АКТИВЕН</span></p>
                        <p><strong>Действителен до:</strong> ${data.expiry_date}</p>
                        <p><strong>Использовано трафика:</strong> ${usedGB} GB</p>
                        <p><strong>Осталось:</strong> ∞ (Безлимит)</p>
                    `;
                } else {
                    resultContent.innerHTML = `<p style="color: #ff6b6b;">❌ ${data.error || 'Пользователь не найден'}</p>`;
                }
            } catch (error) {
                resultContent.innerHTML = `<p style="color: #ff6b6b;">❌ Ошибка: ${error.message}</p>`;
            }
            
            loadingDiv.classList.add('hidden');
            resultDiv.classList.remove('hidden');
        }
        
        document.getElementById('checkBtn').onclick = () => {
            const login = document.getElementById('loginInput').value.trim();
            if (login) checkLogin(login);
        };
        
        document.getElementById('backBtn').onclick = () => {
            loginDiv.classList.remove('hidden');
            resultDiv.classList.add('hidden');
        };
        
        loadingDiv.classList.add('hidden');
    </script>
</body>
</html>
